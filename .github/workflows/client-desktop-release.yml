name: Client Desktop Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to publish desktop artifacts for (for example client-v0.1.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare-release-tag:
    name: Prepare Client Release Tag
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compute and create tag from client version
        id: tag
        shell: bash
        run: |
          VERSION="$(
            awk -F'=' '
              /^\[package\]/ { in_package=1; next }
              /^\[/ && !/^\[package\]/ { in_package=0 }
              in_package && $1 ~ /^[[:space:]]*version[[:space:]]*$/ {
                value=$2
                gsub(/["[:space:]]/, "", value)
                print value
                exit
              }
            ' ./project/apps/client/src-tauri/Cargo.toml
          )"

          if [ -z "${VERSION}" ]; then
            echo "Failed to read package version from project/apps/client/src-tauri/Cargo.toml"
            exit 1
          fi

          TAG_NAME="client-v${VERSION}"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Delete existing release for tag if present
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
        with:
          script: |
            const tag = process.env.TAG_NAME;
            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag
              });
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existing.data.id
              });
              core.info(`Deleted existing release for tag ${tag}.`);
            } catch (error) {
              if (error.status === 404) {
                core.info(`No existing release found for tag ${tag}.`);
                return;
              }
              throw error;
            }

      - name: Force-update tag on latest main commit
        env:
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa "${TAG_NAME}" -m "Desktop client release ${TAG_NAME}"
          git push --force origin "refs/tags/${TAG_NAME}"

  release-client-desktop:
    name: Build and Publish Desktop Client (${{ matrix.platform }})
    if: github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
          - platform: windows-latest
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Validate provided release tag
        id: tag
        shell: bash
        run: |
          TAG_NAME="${{ github.event.inputs.release_tag }}"
          if [[ -z "${TAG_NAME}" ]]; then
            echo "release_tag input is required."
            exit 1
          fi

          if [[ ! "${TAG_NAME}" =~ ^client-v[0-9A-Za-z._-]+$ ]]; then
            echo "Invalid release_tag: ${TAG_NAME}. Expected format client-vX.Y.Z"
            exit 1
          fi

          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ steps.tag.outputs.tag_name }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            project/apps/client/package-lock.json
            project/packages/shared/package-lock.json

      - name: Verify tag exists
        env:
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
        shell: bash
        run: |
          git fetch --tags origin
          if ! git rev-parse "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag ${TAG_NAME} does not exist yet. Push to main first to run prepare-release-tag."
            exit 1
          fi

      - name: Set up Rust toolchain (default)
        if: matrix.platform != 'macos-latest'
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Rust toolchain (macOS universal)
        if: matrix.platform == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: project/apps/client/src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install shared and client dependencies
        run: |
          npm ci --prefix project/packages/shared
          npm ci --prefix project/apps/client

      - name: Build shared package
        run: npm run build --prefix project/packages/shared

      - name: Build and publish desktop release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: project/apps/client
          tagName: ${{ steps.tag.outputs.tag_name }}
          releaseName: Desktop Client ${{ steps.tag.outputs.tag_name }}
          releaseBody: Automated desktop client release artifacts for ${{ steps.tag.outputs.tag_name }}.
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          args: ${{ matrix.args || '' }}
