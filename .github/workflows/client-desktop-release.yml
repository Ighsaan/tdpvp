name: Client Desktop Release

on:
  push:
    tags:
      - "client-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-client-desktop:
    name: Build and Publish Desktop Client (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
          - platform: windows-latest
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            project/apps/client/package-lock.json
            project/packages/shared/package-lock.json

      - name: Set up Rust toolchain (default)
        if: matrix.platform != 'macos-latest'
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Rust toolchain (macOS universal)
        if: matrix.platform == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: project/apps/client/src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install shared and client dependencies
        run: |
          npm ci --prefix project/packages/shared
          npm ci --prefix project/apps/client

      - name: Build shared package
        run: npm run build --prefix project/packages/shared

      - name: Build and publish desktop release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: project/apps/client
          tagName: ${{ github.ref_name }}
          releaseName: Desktop Client ${{ github.ref_name }}
          releaseBody: Automated desktop client release artifacts for ${{ github.ref_name }}.
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          args: ${{ matrix.args || '' }}
