name: Server Colyseus Deployment

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-server-to-colyseus:
    name: Deploy Server to Colyseus (production)
    runs-on: ubuntu-22.04
    environment: production
    steps:
      - name: Validate workflow ref is main branch
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" != refs/heads/main ]]; then
            echo "Manual server deployment must be run from main."
            echo "Use GitHub Actions 'Use workflow from' and select the main branch."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: refs/heads/main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            project/apps/server/package-lock.json
            project/packages/shared/package-lock.json

      - name: Validate Colyseus Cloud deployment prerequisites
        env:
          COLYSEUS_CLOUD_APPLICATION_ID: ${{ secrets.COLYSEUS_CLOUD_APPLICATION_ID }}
          COLYSEUS_CLOUD_TOKEN: ${{ secrets.COLYSEUS_CLOUD_TOKEN }}
        shell: bash
        run: |
          if [ -z "${COLYSEUS_CLOUD_APPLICATION_ID}" ]; then
            echo "Missing required secret: COLYSEUS_CLOUD_APPLICATION_ID"
            exit 1
          fi

          if [ -z "${COLYSEUS_CLOUD_TOKEN}" ]; then
            echo "Missing required secret: COLYSEUS_CLOUD_TOKEN"
            exit 1
          fi

      - name: Install shared and server dependencies
        run: |
          npm ci --prefix project/packages/shared
          npm ci --prefix project/apps/server

      - name: Build shared and server packages
        run: |
          npm run build --prefix project/packages/shared
          npm run build --prefix project/apps/server

      - name: Install Colyseus Cloud CLI
        run: npm install -g @colyseus/cloud

      - name: Deploy to Colyseus Cloud
        working-directory: project/apps/server
        env:
          COLYSEUS_CLOUD_APPLICATION_ID: ${{ secrets.COLYSEUS_CLOUD_APPLICATION_ID }}
          COLYSEUS_CLOUD_TOKEN: ${{ secrets.COLYSEUS_CLOUD_TOKEN }}
        run: |
          colyseus-cloud deploy \
            --applicationId "${COLYSEUS_CLOUD_APPLICATION_ID}" \
            --token "${COLYSEUS_CLOUD_TOKEN}" \
            --branch "main" \
            --env "production"
